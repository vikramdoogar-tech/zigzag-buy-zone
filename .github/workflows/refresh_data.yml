# SIGNAL GENERATOR
# ─────────────────────────────────────────────

def generate_signals(stocks_slim: list, rebound: list) -> dict:
    """
    Generate top trade ideas and alerts.
    Returns dict with categorised signals.
    """
    buy_zone   = []
    rebounders = []

    for s in stocks_slim:
        d = s.get("distance_from_buy_zone")
        if d is not None and 0 <= d <= NEAR_ZONE_PCT:
            buy_zone.append({
                "symbol":   s["symbol"],
                "tier":     s.get("tier"),
                "score":    s.get("score"),
                "price":    s.get("current_price"),
                "l1":       s.get("crash_buy_l1"),
                "target":   s.get("rotation_target"),
                "distance": d,
                "upside":   s.get("upside_pct"),
                "speed":    s.get("speed"),
            })

    for s in rebound:
        if s.get("is_bouncing"):
            rebounders.append({
                "symbol":         s["symbol"],
                "price":          s.get("current_price"),
                "target":         s.get("target"),
                "bounce_day":     s.get("bounce_day"),
                "days_to_target": s.get("days_to_target"),
                "speed":          s.get("speed"),
                "upside":         s.get("upside_pct"),
                "rotations/yr":   s.get("rotations_per_year"),
            })

    # Sort
    buy_zone.sort(key=lambda x: x.get("distance") or 999)
    rebounders.sort(key=lambda x: -(x.get("speed") or 0))

    signals = {
        "generated_at": datetime.now().isoformat(),
        "buy_zone_alerts": buy_zone[:10],
        "rebound_alerts":  rebounders[:10],
        "top_ideas":       (buy_zone + rebounders)[:10],
    }

    sig_path = DATA_DIR / "signals.json"
    with open(sig_path, "w") as f:
        json.dump(signals, f, indent=2)

    log.info(f"  ✔ Signals: {len(buy_zone)} near buy zone, {len(rebounders)} bouncing")
    return signals


# ─────────────────────────────────────────────
# MAIN
# ─────────────────────────────────────────────

def main():
    parser = argparse.ArgumentParser(description="Stock Analysis Engine")
    parser.add_argument("--dry-run", action="store_true", help="Don't overwrite originals")
    parser.add_argument("--symbol",  type=str, default=None, help="Run for a single symbol")
    args = parser.parse_args()

    log.info("=" * 60)
    log.info(f"Stock Engine starting — {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
    log.info(f"Dry run: {args.dry_run} | Symbol filter: {args.symbol or 'ALL'}")
    log.info("=" * 60)

    try:
        log.info("\n[1/3] Updating stocks_slim...")
        stocks_slim = update_stocks_slim(dry_run=args.dry_run, target_symbol=args.symbol)
    except Exception as e:
        log.error(f"stocks_slim failed: {e}")
        stocks_slim = []

    try:
        log.info("\n[2/3] Updating rebound list...")
        rebound = update_rebound(dry_run=args.dry_run, target_symbol=args.symbol)
    except Exception as e:
        log.error(f"rebound failed: {e}")
        rebound = []

    try:
        log.info("\n[3/3] Updating watchlist...")
        update_watchlist(dry_run=args.dry_run, target_symbol=args.symbol)
    except Exception as e:
        log.error(f"watchlist failed: {e}")

    try:
        log.info("\n[✦] Generating signals...")
        generate_signals(stocks_slim, rebound)
    except Exception as e:
        log.error(f"Signal generation failed: {e}")

    log.info("\n" + "=" * 60)
    log.info("Stock Engine complete.")
    log.info("=" * 60)


if __name__ == "__main__":
    main()
