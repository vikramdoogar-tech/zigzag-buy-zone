# ─────────────────────────────────────────────
# HELPERS
# ─────────────────────────────────────────────

def resolve_ticker(symbol: str, exchange: str = "NSE") -> str:
    """Map plain symbol to Yahoo Finance ticker."""
    if symbol in ALIAS_MAP:
        return ALIAS_MAP[symbol]
    suffix = ".NS" if exchange.upper() == "NSE" else ".BO"
    return f"{symbol}{suffix}"


def fetch_current_price(ticker: str) -> float | None:
    """Fetch latest close price. Returns None on failure."""
    try:
        tk = yf.Ticker(ticker)
        hist = tk.history(period="5d")
        if hist.empty:
            return None
        return round(float(hist["Close"].iloc[-1]), 2)
    except Exception as e:
        log.warning(f"Price fetch failed for {ticker}: {e}")
        return None


def fetch_history(ticker: str, years: int = HISTORY_YEARS):
    """
    Fetch daily Close data. Tries primary window first, then shorter fallbacks.
    Returns (DataFrame | None, years_actually_used).
    Accepts as few as MIN_BARS trading days so new listings (MTAR 2021,
    Walchandnagar thin data) are not silently dropped.
    """
    windows = [years] + [y for y in HISTORY_FALLBACKS if y < years]
    end = datetime.today()

    for w in windows:
        try:
            start = end - timedelta(days=w * 365)
            df = yf.download(ticker, start=start, end=end, progress=False, auto_adjust=True)
            if df.empty:
                continue
            # Handle MultiIndex columns from newer yfinance versions
            if isinstance(df.columns, pd.MultiIndex):
                df.columns = df.columns.get_level_values(0)
            if "Close" not in df.columns:
                continue
            df = df[["Close"]].copy()
            df.columns = ["close"]
            df.dropna(inplace=True)
            if len(df) >= MIN_BARS:
                if w < years:
                    log.info(f"    ↳ Using {w}yr fallback ({len(df)} bars)")
                return df, w
        except Exception as e:
            log.warning(f"History fetch failed for {ticker} ({w}yr): {e}")

    return None, 0


# ─────────────────────────────────────────────
# ZIGZAG ENGINE
# ─────────────────────────────────────────────

def compute_zigzag(prices: pd.Series, threshold: float = ZIGZAG_THRESHOLD):
    """
    Identify ZigZag swing highs and lows.
    
    Returns:
        list of dicts: [{idx, price, type}]  type = 'high' | 'low'
    """
    prices = prices.values
    n      = len(prices)
    if n < 5:
        return []

    pivots = []
    direction = None   # 'up' | 'down'
    last_pivot_price = prices[0]
    last_pivot_idx   = 0

    for i in range(1, n):
        p = prices[i]
        chg = (p - last_pivot_price) / last_pivot_price

        if direction is None:
            if chg >= threshold:
                direction        = "up"
                pivots.append({"idx": last_pivot_idx, "price": last_pivot_price, "type": "low"})
                last_pivot_price = p
                last_pivot_idx   = i
            elif chg <= -threshold:
                direction        = "down"
                pivots.append({"idx": last_pivot_idx, "price": last_pivot_price, "type": "high"})
                last_pivot_price = p
                last_pivot_idx   = i
        elif direction == "up":
            if p > last_pivot_price:
                last_pivot_price = p
                last_pivot_idx   = i
            elif (last_pivot_price - p) / last_pivot_price >= threshold:
                pivots.append({"idx": last_pivot_idx, "price": last_pivot_price, "type": "high"})
                direction        = "down"
                last_pivot_price = p
                last_pivot_idx   = i
        elif direction == "down":
            if p < last_pivot_price:
                last_pivot_price = p
                last_pivot_idx   = i
            elif (p - last_pivot_price) / last_pivot_price >= threshold:
                pivots.append({"idx": last_pivot_idx, "price": last_pivot_price, "type": "low"})
                direction        = "up"
                last_pivot_price = p
                last_pivot_idx   = i

    # Add final pivot
    ptype = "high" if direction == "up" else "low"
    if not pivots or pivots[-1]["idx"] != last_pivot_idx:
        pivots.append({"idx": last_pivot_idx, "price": last_pivot_price, "type": ptype})

    return pivots


def compute_metrics(df: pd.DataFrame, pivots: list) -> dict:
    """
    From ZigZag pivots, compute rise/drop metrics.
    
    Returns dict with:
        avg_rise_pct, avg_drop_pct, avg_rise_days, avg_drop_days, speed
        last_swing_low, last_swing_high
        all pivot prices/indices for level computation
    """
    if len(pivots) < 3:
        return {}

    rises, drops = [], []
    rise_days_list, drop_days_list = [], []

    for i in range(len(pivots) - 1):
        a, b = pivots[i], pivots[i + 1]
        days  = b["idx"] - a["idx"]
        pct   = (b["price"] - a["price"]) / a["price"] * 100

        if a["type"] == "low" and b["type"] == "high":
            rises.append(pct)
            rise_days_list.append(days)
        elif a["type"] == "high" and b["type"] == "low":
            drops.append(pct)
            drop_days_list.append(days)

    avg_rise_pct   = round(float(np.mean(rises)),      2) if rises      else 0.0
    avg_drop_pct   = round(float(np.mean(drops)),      2) if drops      else 0.0
    avg_rise_days  = round(float(np.mean(rise_days_list)), 1) if rise_days_list else 0.0
    avg_drop_days  = round(float(np.mean(drop_days_list)), 1) if drop_days_list else 0.0
    speed          = round(avg_rise_pct / avg_rise_days, 4) if avg_rise_days > 0 else 0.0

    lows  = [p for p in pivots if p["type"] == "low"]
    highs = [p for p in pivots if p["type"] == "high"]

    last_swing_low  = round(lows[-1]["price"],  2) if lows  else None
    last_swing_high = round(highs[-1]["price"], 2) if highs else None

    return {
        "avg_rise_pct":   avg_rise_pct,
        "avg_drop_pct":   avg_drop_pct,
        "avg_rise_days":  avg_rise_days,
        "avg_drop_days":  avg_drop_days,
        "speed":          speed,
        "last_swing_low": last_swing_low,
        "last_swing_high":last_swing_high,
        "cycle_count":    len(rises),
    }


def compute_levels(metrics: dict) -> dict:
    """
    Compute buy levels, stop loss, targets from metrics.
    
    L1 = last swing low
    L2 = L1 - 15% of avg_drop depth
    L3 = L1 - 30% of avg_drop depth
    SL = L3 * 0.95
    Target = last swing high OR L1 * (1 + avg_rise_pct/100)
    """
    l1 = metrics.get("last_swing_low")
    if l1 is None:
        return {}

    avg_drop_abs = abs(metrics.get("avg_drop_pct", 20)) / 100
    l2 = round(l1 * (1 - avg_drop_abs * L2_DROP_FACTOR), 2)
    l3 = round(l1 * (1 - avg_drop_abs * L3_DROP_FACTOR), 2)
    sl = round(l3 * (1 - STOP_LOSS_BUFFER), 2)

    swing_high = metrics.get("last_swing_high")
    avg_rise   = metrics.get("avg_rise_pct", 35)
    if swing_high and swing_high > l1:
        target = round(swing_high, 2)
    else:
        target = round(l1 * (1 + avg_rise / 100), 2)

    return {"l1": l1, "l2": l2, "l3": l3, "stop_loss": sl, "target": target}


def is_bouncing(df: pd.DataFrame, pivots: list, current_price: float, lookback: int = 5) -> tuple:
    """
    Detect if stock is bouncing off a recent low.
    Returns (is_bouncing: bool, bounce_day: int | None)
    bounce_day = how many days ago it started bouncing
    """
    if not pivots or current_price is None:
        return False, None

    lows = [p for p in pivots if p["type"] == "low"]
    if not lows:
        return False, None

    last_low     = lows[-1]
    last_low_idx = last_low["idx"]
    n            = len(df)
    days_since   = n - 1 - last_low_idx

    # Bouncing = within last 20 trading days AND price > low by at least 2%
    if 0 <= days_since <= 20:
        bounce_pct = (current_price - last_low["price"]) / last_low["price"] * 100
        if bounce_pct >= 2.0:
            return True, int(days_since)

    return False, None


# ─────────────────────────────────────────────
# ANALYSIS CORE
# ─────────────────────────────────────────────

def analyse_stock(symbol: str, exchange: str = "NSE") -> dict | None:
    """
    Full analysis pipeline for one stock.
    Includes adaptive fallbacks for new listings and thin-data stocks:
      - History:  3yr → 2yr → 1yr
      - Threshold: 8% → 5% → 3%
      - Min pivots: 3 (was 4)
    Returns enriched dict or None on failure.
    """
    ticker = resolve_ticker(symbol, exchange)
    log.info(f"  Analysing {symbol} ({ticker})")

    time.sleep(REQUEST_DELAY)

    # 1. Current price
    price = fetch_current_price(ticker)
    if price is None:
        log.warning(f"  ✗ Could not get price for {symbol}. Skipping.")
        return None

    # 2. Historical data — adaptive window
    df, years_used = fetch_history(ticker)
    if df is None:
        log.warning(f"  ✗ No history for {symbol} (tried all windows). Skipping.")
        return None

    # 3. ZigZag — adaptive threshold
    # Try primary threshold, then fall back to finer ones for low-volatility
    # or short-history stocks (MTAR listed 2021, Walchandnagar sparse)
    pivots = []
    threshold_used = ZIGZAG_THRESHOLD
    all_thresholds = [ZIGZAG_THRESHOLD] + ZIGZAG_FALLBACKS

    for thresh in all_thresholds:
        pivots = compute_zigzag(df["close"], threshold=thresh)
        if len(pivots) >= MIN_PIVOTS:
            if thresh != ZIGZAG_THRESHOLD:
                log.info(f"    ↳ Using {thresh*100:.0f}% ZigZag threshold ({len(pivots)} pivots)")
            threshold_used = thresh
            break

    if len(pivots) < MIN_PIVOTS:
        log.warning(
            f"  ✗ Too few pivots for {symbol} even at "
            f"{all_thresholds[-1]*100:.0f}% threshold "
            f"({len(pivots)} pivots, {len(df)} bars). Skipping."
        )
        return None

    # Tag data quality so dashboard can show a warning icon
    data_quality = "full" if years_used >= HISTORY_YEARS and threshold_used == ZIGZAG_THRESHOLD else "limited"

    # 4. Metrics & levels
    metrics = compute_metrics(df, pivots)
    if not metrics:
        return None

    levels = compute_levels(metrics)
    if not levels:
        return None

    # 5. Derived metrics
    l1 = levels["l1"]
    target = levels["target"]
    distance_from_buy_zone = round((price / l1 - 1) * 100, 2) if l1 else None
    upside_pct             = round((target / price - 1) * 100, 2) if target and price else None
    speed                  = metrics.get("speed")

    # 6. Bounce detection
    bouncing, bounce_day = is_bouncing(df, pivots, price)

    # 7. Timing
    avg_rise_days = metrics.get("avg_rise_days", 0)
    cycle_days    = avg_rise_days + metrics.get("avg_drop_days", 0)
    rotations_per_year = round(252 / cycle_days, 2) if cycle_days > 0 else None
    days_to_target = round(avg_rise_days - (bounce_day or 0), 0) if bouncing and avg_rise_days else None

    return {
        "current_price":         price,
        "avg_rise_pct":          metrics["avg_rise_pct"],
        "avg_drop_pct":          metrics["avg_drop_pct"],
        "avg_rise_days":         metrics["avg_rise_days"],
        "avg_drop_days":         metrics["avg_drop_days"],
        "speed":                 speed,
        "last_swing_low":        metrics["last_swing_low"],
        "last_swing_high":       metrics["last_swing_high"],
        "cycle_count":           metrics["cycle_count"],
        "data_quality":          data_quality,
        "history_years":         years_used,
        "zigzag_threshold_used": threshold_used,
        "l1":                    levels["l1"],
        "l2":                    levels["l2"],
        "l3":                    levels["l3"],
        "stop_loss":             levels["stop_loss"],
        "crash_buy_l1":          levels["l1"],
        "rotation_target":       target,
        "target":                target,
        "distance_from_buy_zone": distance_from_buy_zone,
        "distance_from_l1":      distance_from_buy_zone,
        "upside_pct":            upside_pct,
        "is_bouncing":           bouncing,
        "bounce_day":            bounce_day,
        "days_to_target":        days_to_target,
        "rotations_per_year":    rotations_per_year,
        "last_updated":          datetime.now().isoformat(),
    }


# ─────────────────────────────────────────────
# JSON UPDATERS
# ─────────────────────────────────────────────

def update_stocks_slim(dry_run: bool = False, target_symbol: str = None):
    path = DATA_DIR / "data_stocks_slim.json"
    with open(path) as f:
        stocks = json.load(f)

    updated, failed = 0, 0
    for stock in stocks:
        sym = stock["symbol"]
        if target_symbol and sym != target_symbol:
            continue

        result = analyse_stock(sym, stock.get("exchange", "NSE"))
        if result is None:
            failed += 1
            continue

        # Overwrite calculated fields; preserve manual fields (tier, score)
        stock.update({
            "current_price":         result["current_price"],
            "avg_rise_pct":          result["avg_rise_pct"],
            "avg_drop_pct":          result["avg_drop_pct"],
            "avg_rise_days":         result["avg_rise_days"],
            "avg_drop_days":         result["avg_drop_days"],
            "speed":                 result["speed"],
            "crash_buy_l1":          result["crash_buy_l1"],
            "l2":                    result["l2"],
            "l3":                    result["l3"],
            "stop_loss":             result["stop_loss"],
            "rotation_target":       result["rotation_target"],
            "distance_from_buy_zone":result["distance_from_buy_zone"],
            "upside_pct":            result["upside_pct"],
            "data_quality":          result.get("data_quality", "full"),
            "history_years":         result.get("history_years"),
            "zigzag_threshold":      result.get("zigzag_threshold_used"),
            "last_updated":          result["last_updated"],
        })
        updated += 1

    out_path = DATA_DIR / "data_stocks_slim.refreshed.json"
    with open(out_path, "w") as f:
        json.dump(stocks, f, indent=2)

    if not dry_run:
        with open(path, "w") as f:
            json.dump(stocks, f, indent=2)
        log.info(f"  ✔ stocks_slim updated → {updated} ok, {failed} skipped")
    else:
        log.info(f"  [DRY RUN] stocks_slim → {updated} ok, {failed} skipped. Refreshed file written.")

    return stocks


