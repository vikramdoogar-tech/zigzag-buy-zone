name: Refresh data and deploy to Pages

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Run every weekday at 11:30 UTC (~5:00 PM IST, after NSE close)
  schedule:
    - cron: "30 11 * * 1-5"
  # Also rebuild on pushes to main (without re-fetching data)
  push:
    branches: [main]

# Permissions required by the official Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      # Only fetch fresh market data on scheduled or manual runs;
      # plain pushes just redeploy the existing JSON.
      - name: Refresh stock data
        if: github.event_name != 'push'
        run: python refresh.py

      - name: Replace JSON
        if: github.event_name != 'push'
        run: |
          if [ -f data_stocks_slim.refreshed.json ]; then cp data_stocks_slim.refreshed.json data_stocks_slim.json; fi
          if [ -f data_rebound.refreshed.json ];     then cp data_rebound.refreshed.json     data_rebound.json;     fi
          if [ -f data_watchlist.refreshed.json ];   then cp data_watchlist.refreshed.json   data_watchlist.json;   fi

      # Persist the refreshed JSON back to the repo so subsequent
      # plain-push deploys serve the latest numbers.
      - name: Commit refreshed JSON
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_stocks_slim.json data_rebound.json data_watchlist.json
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "chore: refresh stock data [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root. Change to "./site" or "./dist" if
          # your HTML lives in a subfolder.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
