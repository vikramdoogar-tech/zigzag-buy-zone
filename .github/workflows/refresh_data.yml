def update_watchlist(dry_run: bool = False, target_symbol: str = None):
    path = DATA_DIR / "data_watchlist.json"
    with open(path) as f:
        stocks = json.load(f)

    updated, failed = 0, 0
    for stock in stocks:
        sym = stock["symbol"]
        if target_symbol and sym != target_symbol:
            continue

        ticker = resolve_ticker(sym, stock.get("exchange", "NSE"))
        time.sleep(REQUEST_DELAY)
        price = fetch_current_price(ticker)

        if price is None:
            failed += 1
            continue

        entry  = stock.get("entry") or 0
        target = stock.get("target") or 0
        sl     = stock.get("stop_loss") or 0
        qty    = stock.get("quantity") or 1

        pnl        = round((price - entry) * qty, 2) if entry else None
        pnl_pct    = round((price / entry - 1) * 100, 2) if entry else None
        upside_pct = round((target / price - 1) * 100, 2) if target and price else None
        risk       = abs(entry - sl) if entry and sl else 1
        reward     = abs(target - entry) if target and entry else 0
        rr         = round(reward / risk, 2) if risk > 0 else None

        stock.update({
            "current_price":       price,
            "pnl":                 pnl,
            "pnl_pct":             pnl_pct,
            "upside_to_target_pct":upside_pct,
            "risk_reward":         rr,
            "last_updated":        datetime.now().isoformat(),
        })
        updated += 1

    out_path = DATA_DIR / "data_watchlist.refreshed.json"
    with open(out_path, "w") as f:
        json.dump(stocks, f, indent=2)

    if not dry_run:
        with open(path, "w") as f:
            json.dump(stocks, f, indent=2)
        log.info(f"  ✔ watchlist updated → {updated} ok, {failed} skipped")
    else:
        log.info(f"  [DRY RUN] watchlist → {updated} ok, {failed} skipped")

    return stocks


