update_stocks.py
================
Automated Stock Analysis Engine for NSE/BSE
Fetches prices, computes ZigZag cycles, updates buy zones and targets.

Usage:
    python update_stocks.py
    python update_stocks.py --dry-run    # don't overwrite originals
    python update_stocks.py --symbol RELIANCE  # single stock debug
"""

