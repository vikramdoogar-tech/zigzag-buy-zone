name: Refresh ZigZag Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 11 * * 1-5"   # 16:50 IST, Mon-Fri

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh script
        run: |
          python refresh_data.py

      - name: Replace old JSON with refreshed files
        run: |
          if [ -f data_rebound.refreshed.json ]; then cp data_rebound.refreshed.json data_rebound.json; fi
          if [ -f data_watchlist.refreshed.json ]; then cp data_watchlist.refreshed.json data_watchlist.json; fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_rebound.json data_watchlist.json data_rebound.refreshed.json data_watchlist.refreshed.json || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-refresh ZigZag data"
          git push
