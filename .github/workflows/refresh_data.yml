ZIGZAG_THRESHOLD   = 0.08      # 8% swing threshold (primary)
ZIGZAG_FALLBACKS   = [0.05, 0.03]  # retry thresholds for thin/new stocks
HISTORY_YEARS      = 3         # years of historical data (primary)
HISTORY_FALLBACKS  = [2, 1]    # retry lookback windows if 3yr has too few bars
MIN_BARS           = 20        # minimum trading days needed (was 50)
MIN_PIVOTS         = 3         # minimum ZigZag pivots needed (was 4)
L2_DROP_FACTOR     = 0.15      # L2 = L1 - 15% of avg_drop
L3_DROP_FACTOR     = 0.30      # L3 = L1 - 30% of avg_drop
STOP_LOSS_BUFFER   = 0.05      # SL = L3 * 0.95
NEAR_ZONE_PCT      = 10.0      # "near buy zone" threshold %
REQUEST_DELAY      = 0.5       # seconds between yfinance calls

